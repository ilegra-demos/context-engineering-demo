receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

connectors:
  spanmetrics:
    namespace: traces_spanmetrics
    dimensions:
      - name: gen_ai.operation.name
      - name: gen_ai.provider.name
      - name: gen_ai.request.model
      - name: gen_ai.response.model
      - name: gen_ai.agent.name
      - name: gen_ai.conversation.id
      - name: gen_ai.tool.name
      - name: server.address
      - name: error.type
      - name: session.id

processors:
  resource:
    attributes:
      - key: telemetry.demo
        value: copilot-observability
        action: upsert
  batch:
    send_batch_size: 8192
    timeout: 5s
    send_batch_max_size: 10240

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: "otel"
    send_timestamps: false
    metric_expiration: 30m

  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [spanmetrics, debug]
    metrics:
      receivers: [otlp, spanmetrics]
      processors: [resource, batch]
      exporters: [prometheus, debug]
  telemetry:
    logs:
      level: "info"
